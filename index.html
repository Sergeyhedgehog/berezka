<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2e7d32">
    <title>Берёзка</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css?v=2" charset="utf-8">
</head>
<body>

    <!-- Экран загрузки -->
    <div id="screen-loading" class="screen active">
        <div class="center-container">
            <div class="logo">🌿</div>
            <h1>Берёзка</h1>
            <p id="loading-text">Загрузка...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Экран авторизации -->
    <div id="screen-auth" class="screen">
        <div class="center-container auth-center">
            <div class="logo">🌿</div>
            <h1>Берёзка</h1>
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>
                <div class="auth-form">
                    <input type="text" id="auth-username" placeholder="Логин" autocomplete="username" autocapitalize="off" spellcheck="false">
                    <input type="password" id="auth-password" placeholder="Пароль" autocomplete="current-password">
                    <button id="btn-auth" class="btn-primary btn-full">Войти</button>
                    <p id="auth-error" class="status error"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="screen-main" class="screen">
        <div class="header">
            <h1>🌿 Берёзка</h1>
            <button id="btn-logout" class="btn-icon header-btn" title="Выйти">🚪</button>
        </div>
        <div class="main-content">
            <div class="your-id-section">
                <p class="label">Ваш логин:</p>
                <div class="id-display">
                    <span id="my-id">——</span>
                    <button id="btn-copy" class="btn-icon" title="Скопировать">📋</button>
                </div>
            </div>

            <div class="connect-section">
                <p class="label">Написать пользователю:</p>
                <div class="input-row">
                    <input type="text" id="peer-id-input" placeholder="Логин" autocomplete="off" autocapitalize="off" spellcheck="false">
                    <button id="btn-connect" class="btn-primary">Написать</button>
                </div>
                <p id="connect-status" class="status"></p>
            </div>

            <div class="action-row">
                <button id="btn-new-group" class="btn-secondary btn-full">+ Создать группу</button>
            </div>

            <div id="chats-list" class="chats-section">
                <p class="label">Чаты:</p>
            </div>
        </div>
    </div>

    <!-- Экран создания группы -->
    <div id="screen-create-group" class="screen">
        <div class="header">
            <button id="btn-back-create" class="btn-icon header-btn">&#8592;</button>
            <h1>Новая группа</h1>
        </div>
        <div class="main-content">
            <div class="form-section">
                <input type="text" id="group-name-input" placeholder="Название группы" maxlength="30">
                <textarea id="group-desc-input" placeholder="Описание (необязательно)" maxlength="200" rows="3"></textarea>
            </div>
            <div class="form-section">
                <p class="label">Добавить участников:</p>
                <div class="input-row">
                    <input type="text" id="group-member-input" placeholder="Логин" autocapitalize="off" spellcheck="false">
                    <button id="btn-add-member" class="btn-primary">+</button>
                </div>
                <p id="group-member-status" class="status"></p>
                <div id="members-list" class="members-list"></div>
            </div>
            <button id="btn-create-group" class="btn-primary btn-full">Создать группу</button>
            <p id="create-group-error" class="status error"></p>
        </div>
    </div>

    <!-- Экран чата -->
    <div id="screen-chat" class="screen">
        <div class="header chat-header">
            <button id="btn-back" class="btn-icon header-btn">&#8592;</button>
            <div id="chat-header-info" class="chat-header-info">
                <h1 id="chat-peer-name">——</h1>
                <p id="chat-subtitle" class="chat-subtitle"></p>
            </div>
            <button id="btn-chat-menu" class="btn-icon header-btn">&#8942;</button>
        </div>
        <div id="messages" class="messages"></div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
            <button id="btn-send" class="btn-primary">&#8594;</button>
        </div>
    </div>

    <!-- Экран информации о группе -->
    <div id="screen-group-info" class="screen">
        <div class="header">
            <button id="btn-back-info" class="btn-icon header-btn">&#8592;</button>
            <h1>О группе</h1>
        </div>
        <div class="main-content">
            <div class="form-section group-info-header">
                <h2 id="info-group-name"></h2>
                <p id="info-group-desc" class="text-light"></p>
                <p id="info-group-creator" class="text-light small"></p>
            </div>
            <div class="form-section">
                <p class="label" id="info-members-label">Участники:</p>
                <div id="info-members-list" class="members-list"></div>
            </div>
            <div id="info-add-member-section" class="form-section" style="display:none">
                <p class="label">Добавить участника:</p>
                <div class="input-row">
                    <input type="text" id="info-member-input" placeholder="Логин" autocapitalize="off" spellcheck="false">
                    <button id="btn-info-add-member" class="btn-primary">+</button>
                </div>
                <p id="info-member-status" class="status"></p>
            </div>
            <div id="info-actions" class="info-actions"></div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" charset="utf-8"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js" charset="utf-8"></script>
    <script src="app.js?v=3" charset="utf-8"></script>
</body>
</html>
